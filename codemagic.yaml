workflows:
  ios-workflow:
    name: iOS IPA Build (No Code Signing - For Jailbroken Devices)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter dependencies
        script: |
          flutter packages pub get
      - name: Build iOS App Bundle (No Code Signing)
        script: |
          flutter build ios --release --no-codesign
      - name: Create IPA from App Bundle
        script: |
          cd build/ios/iphoneos
          mkdir -p ../ipa
          xcrun zip -r ../ipa/Runner.ipa Runner.app
          cd ../..
          echo "IPA created at build/ios/ipa/Runner.ipa"
    artifacts:
      - build/ios/ipa/*.ipa

